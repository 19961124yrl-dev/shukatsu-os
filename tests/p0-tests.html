<!doctype html>
<html lang="ja"><meta charset="utf-8"><title>Shūkatsu OS P0 テスト</title>
<style>body{font:15px system-ui;margin:2rem;background:#f5f8f7;color:#123}li{margin:.4rem 0}.ok{color:#087443}.ng{color:#b42318}</style>
<h1>Shūkatsu OS P0 テスト</h1><p id="summary">実行中…</p><ul id="results"></ul>
<script type="module">
import { upgradeDatabase } from '../js/db.js'; import { blankState, migrateState, parseBackupJSON, recordStatusChange, removeApplicationAndRelations, selectionInProgressCount } from '../js/state.js'; import { stringifyCSV, parseCSV } from '../js/csv.js'; import { calendarItems } from '../js/dates.js';
const output=document.querySelector('#results');let passed=0,failed=0;const test=async(name,fn)=>{try{await fn();passed++;output.insertAdjacentHTML('beforeend',`<li class="ok">✓ ${name}</li>`)}catch(error){failed++;output.insertAdjacentHTML('beforeend',`<li class="ng">✗ ${name}: ${error.message}</li>`)}};const assert=(value,message='assertion failed')=>{if(!value)throw new Error(message)};const sample=()=>({schemaVersion:3,applications:[{id:'a1',companyName:'テスト株式会社',jobTitle:'エンジニア',status:'entered',documents:['d1'],interviews:[],contacts:[]}],tasks:[{id:'t1',applicationId:'a1',title:'ES',dueAt:'2030-01-02T09:00:00.000Z',completed:false}],events:[],documents:[{id:'d1',name:'履歴書',companyIds:['a1']}],settings:{userMode:'new_grad'}});
await test('CRUD: 企業データを作成・更新・参照できる',()=>{const state=blankState();state.applications.push({id:'a1',companyName:'テスト株式会社',jobTitle:'営業',status:'interested',documents:[]});state.applications[0].jobTitle='企画';assert(state.applications[0].jobTitle==='企画')});
await test('状態変更: 時刻付きタイムラインを追加する',()=>{const state=sample();recordStatusChange(state,'a1','interview_1','日程確定',{uid:()=> 'e1',now:()=> '2030-01-01T00:00:00.000Z',labels:{interview_1:'一次面接'}});assert(state.events[0].previousStatus==='entered'&&state.events[0].newStatus==='interview_1'&&state.events[0].occurredAt)});
await test('企業削除: tasks/events/書類関連を孤立させない',()=>{const state=sample();state.events.push({id:'e1',applicationId:'a1'});removeApplicationAndRelations(state,'a1');assert(!state.applications.length&&!state.tasks.length&&!state.events.length&&!state.documents[0].companyIds.length)});
await test('JSON: 書き出し・復元のデータを維持する',()=>{const state=sample();const restored=migrateState(parseBackupJSON(JSON.stringify(state)),{uid:()=> 'id',now:()=> '2030-01-01T00:00:00.000Z',status:{entered:'エントリー済み'}});assert(restored.applications[0].companyName==='テスト株式会社')});
await test('JSON: 壊れた JSON を拒否する',()=>{let rejected=false;try{parseBackupJSON('{bad')}catch{rejected=true}assert(rejected)});
await test('CSV: カンマ・改行・引用符を安全に往復する',()=>{const source=[['企業名','メモ'],['A, Inc.','一行目\n"引用"']];assert(JSON.stringify(parseCSV(stringifyCSV(source)))===JSON.stringify(source))});
await test('統計: 気になる・プレエントリーを選考中に含めない',()=>assert(selectionInProgressCount([{status:'interested'},{status:'pre_entry'},{status:'entered'},{status:'rejected'}])===1));
await test('カレンダー: 締切・面接・未完了タスクを同じ state から取得する',()=>{const state=sample();state.applications[0].esDeadline='2030-01-03T09:00:00.000Z';state.applications[0].interviewAt='2030-01-04T09:00:00.000Z';assert(calendarItems(state).length===3)});
await test('IndexedDB: v1 から v3 への更新で main レコードを保持する',async()=>{const name=`shukatsu-os-upgrade-test-${crypto.randomUUID()}`,create=indexedDB.open(name,1);await new Promise((resolve,reject)=>{create.onupgradeneeded=()=>create.result.createObjectStore('state');create.onsuccess=resolve;create.onerror=()=>reject(create.error)});const first=create.result;await new Promise((resolve,reject)=>{const r=first.transaction('state','readwrite').objectStore('state').put({applications:[{id:'legacy'}]},'main');r.onsuccess=resolve;r.onerror=()=>reject(r.error)});first.close();const upgrade=indexedDB.open(name,3);await new Promise((resolve,reject)=>{upgrade.onupgradeneeded=e=>upgradeDatabase(upgrade.result,e.oldVersion,e.newVersion);upgrade.onsuccess=resolve;upgrade.onerror=()=>reject(upgrade.error)});const db=upgrade.result,value=await new Promise((resolve,reject)=>{const r=db.transaction('state').objectStore('state').get('main');r.onsuccess=()=>resolve(r.result);r.onerror=()=>reject(r.error)});assert(value.applications[0].id==='legacy');db.close();indexedDB.deleteDatabase(name)});
document.querySelector('#summary').textContent=`完了: ${passed}件成功 / ${failed}件失敗`;
</script>
